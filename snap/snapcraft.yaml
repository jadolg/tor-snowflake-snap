name: tor-snowflake
base: core24
version: 'v2.13.1'
summary: Snowflake proxy
description: Snowflake proxy for Tor
grade: stable
confinement: strict

layout:
  /usr/share/tor:
    bind: $SNAP/usr/share/tor

apps:
  snowflake:
    command: bin/proxy -log $SNAP_DATA/snowflake.log -metrics
    daemon: simple
    plugs:
      - network
      - network-bind

platforms:
  amd64:
  arm64:
  armhf:
  ppc64el:
  s390x:

parts:
  snowflake:
    source: https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake.git
    source-type: git
    source-tag: 'v2.13.1'
    source-subdir: proxy
    plugin: go
    build-snaps: [go/latest/stable]
    stage-packages:
      - tor
      - tor-geoipdb
